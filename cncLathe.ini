# cncLathe.ini — Phenix Wood Lathe CNC Conversion
# Raspberry Pi 4B + Byte2Bot Parallel Hat + MicroKinetics DM8078 drivers
#
# Scale calculation:
#   1600 pul/rev (DM8078 dip switches: SW5=ON SW6=OFF SW7=ON SW8=ON)
#   Lead screw: 4 threads/cm = 2.5 mm/rev
#   SCALE = 1600 / 2.5 = 640 pulses/mm

[EMC]
MACHINE = cncLathe
DEBUG   = 0
VERSION = 1.1

[DISPLAY]
DISPLAY               = axis
EDITOR                = gedit
POSITION_OFFSET       = RELATIVE
POSITION_FEEDBACK     = ACTUAL
ARCDIVISION           = 64
GRIDS                 = 10mm 20mm 50mm 100mm 1in 2in 5in 10in
MAX_FEED_OVERRIDE     = 1.2
MIN_SPINDLE_OVERRIDE  = 0.5
MAX_SPINDLE_OVERRIDE  = 1.2
DEFAULT_LINEAR_VELOCITY = 2.50
MIN_LINEAR_VELOCITY   = 0
MAX_LINEAR_VELOCITY   = 25.00
CYCLE_TIME            = 0.100
INTRO_GRAPHIC         = linuxcnc.gif
INTRO_TIME            = 5
PROGRAM_PREFIX        = /home/cnc/linuxcnc/nc_files
INCREMENTS            = 5mm 1mm .5mm .1mm .05mm .01mm .005mm
LATHE                 = 1

[KINS]
JOINTS       = 2
KINEMATICS   = trivkins coordinates=XZ

[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
PROGRAM_EXTENSION = .py Python Script
PROGRAM_EXTENSION = .nc,.tap G-Code File
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py  = python

[TASK]
TASK       = milltask
CYCLE_TIME = 0.010

[RS274NGC]
PARAMETER_FILE = linuxcnc.var

[EMCMOT]
EMCMOT       = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD  = 100000
SERVO_PERIOD = 1000000

[HAL]
HALFILE         = cncLathe.hal
HALFILE         = custom.hal
POSTGUI_HALFILE = postgui_call_list.hal

[TRAJ]
COORDINATES             = X Z
LINEAR_UNITS            = mm
ANGULAR_UNITS           = degree
DEFAULT_LINEAR_VELOCITY = 2.50
MAX_LINEAR_VELOCITY     = 25.00

[EMCIO]
EMCIO      = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl


# ============================================================
# AXIS_X / JOINT_0 — Cross Slide
# ============================================================
# Home switch (min-home-x) is at the MINIMUM end of X travel.
# Homing sequence: 1 — X homes first, then Z homes after X completes.
#
# Homing motion:
#   1. Move at -10 mm/s (toward MIN) until switch triggers
#   2. Back off at +1 mm/s until switch releases
#   3. Creep at +1 mm/s until switch triggers again  <- latch point
#   4. Move to HOME = 0.0

[AXIS_X]
MAX_VELOCITY     = 25.0
MAX_ACCELERATION = 750.0
MIN_LIMIT        = -0.001
MAX_LIMIT        = 100.0

[JOINT_0]
TYPE               = LINEAR
HOME               = 0.0
MIN_LIMIT          = -0.001
MAX_LIMIT          = 100.0
MAX_VELOCITY       = 25.0
MAX_ACCELERATION   = 750.0
STEPGEN_MAXACCEL   = 937.5
SCALE              = 640.0
FERROR             = 1
MIN_FERROR         = 0.25
HOME_OFFSET        = 0.0
HOME_SEARCH_VEL    = -10.0
HOME_LATCH_VEL     = 1.0
HOME_IGNORE_LIMITS = YES
HOME_SEQUENCE      = 1


# ============================================================
# AXIS_Z / JOINT_1 — Carriage Along Bed
# ============================================================
# Home switch (min-home-z) is at the MINIMUM end of Z travel
# (tailstock / far end of bed).
# Homing sequence: 2 — Z homes after X has completed.
#
# Homing motion:
#   1. Move at -10 mm/s (toward MIN / tailstock) until switch triggers
#   2. Back off at +1 mm/s until switch releases
#   3. Creep at +1 mm/s until switch triggers again  <- latch point
#   4. Move to HOME = 0.0

[AXIS_Z]
MAX_VELOCITY     = 25.0
MAX_ACCELERATION = 750.0
MIN_LIMIT        = -800.0
MAX_LIMIT        = 0.001

[JOINT_1]
TYPE               = LINEAR
HOME               = 0.0
MIN_LIMIT          = -800.0
MAX_LIMIT          = 0.001
MAX_VELOCITY       = 25.0
MAX_ACCELERATION   = 750.0
STEPGEN_MAXACCEL   = 937.5
SCALE              = 640.0
FERROR             = 1
MIN_FERROR         = 0.25
HOME_OFFSET        = 0.0
HOME_SEARCH_VEL    = -10.0
HOME_LATCH_VEL     = 1.0
HOME_IGNORE_LIMITS = YES
HOME_SEQUENCE      = 2
